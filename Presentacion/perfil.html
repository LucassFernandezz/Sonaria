<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | Sonaría</title>
    <link rel="stylesheet" href="perfil.css">
</head>
<body>
    <header class="header-con-busqueda">
        <a href="musicas.html" class="logo-link">
            <div class="logo">
                <img src="logo.png" alt="Logo Sonaría" class="logo-img">
                <span class="nombre">Sonaría</span>
            </div>
        </a>

        <div class="barra-central">
            <input type="text" placeholder="🔍">
            <span class="filtro-texto">Filtro</span>
            <div class="iconos-header">
                <span>⬆️</span>
                <a href="Configuracion.html" class="icono-link">⚙️</a>
                <span>👤</span>
            </div>
        </div>

        <nav>
            <a href="login.html" class="btn-inicio-sesion">Iniciar sesión</a>
        </nav>
    </header>

    <main class="perfil-page">

        <!-- Sección de usuario -->
        <section class="perfil-usuario">
            <img src="usuario.png" alt="Usuario" class="perfil-foto">
            <div class="perfil-info">
                <h2 class="perfil-nombre">Yamir Britos</h2>
                <p class="perfil-rol">Baterista</p>
            </div>
        </section>

        <!-- Caja rosa de descripción -->
        <div class="descripcion-cuadro perfil-descripcion">
            <p>Descripción</p>
        </div>

        <!-- Lista de canciones del usuario -->
        <div class="lista-musicas perfil-lista">
            <div class="musica-card">
                <img src="ride.jpg" alt="Grabación Base" class="musica-img">
                <span class="musica-titulo">Grabación Base</span>
            </div>

            <div class="musica-card">
                <img src="ride.jpg" alt="Grabación Base" class="musica-img">
                <span class="musica-titulo">Grabación Base</span>
            </div>
        </div>

    </main>

    <footer>
        <p>&copy; 2025 Sonaría | Plataforma de colaboración musical</p>
    </footer>
</body>
</html>
