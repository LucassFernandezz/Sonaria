<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión | Sonaría</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <header class="header-con-busqueda">
    <a href="musicas.html" class="logo-link">
      <div class="logo">
          <img src="logo.png" alt="Logo Sonaría" class="logo-img">
          <span class="nombre">Sonaría</span>
      </div>
    </a>


    <div class="barra-central">
      <input type="text" placeholder="🔍">
      <span class="filtro-texto">Filtro</span>
      <div class="iconos-header">
        <span>⬆️</span>
        <a href="Configuracion.html" class="icono-link">⚙️</a>
        <span>👤</span>
      </div>
    </div>

    <nav>
      <a href="Registro.html" class="btn-inicio-sesion">Registrar sesión</a>
    </nav>
  </header>

  <main>
    <h1>Iniciar Sesión</h1>

    <form class="form-login">
      <label for="usuario">Usuario o correo:</label>
      <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario o correo" required>

      <label for="password">Contraseña:</label>
      <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>

      <button type="submit" class="btn-accion">Entrar</button>

      <p class="texto-registro">
        ¿No tenés cuenta? <a href="registro.html">Registrate aquí</a>
      </p>
    </form>
  </main>

  <footer>
    <p>&copy; 2025 Sonaría | Plataforma de colaboración musical</p>
  </footer>
</body>
</html>
