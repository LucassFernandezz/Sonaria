<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Músicas | Sonaría</title>
    <link rel="stylesheet" href="musicas.css">
</head>
<body>
    <header class="header-con-busqueda">
        <a href="musicas.html" class="logo-link">
            <div class="logo">
                <img src="logo.png" alt="Logo Sonaría" class="logo-img">
                <span class="nombre">Sonaría</span>
            </div>
        </a>

        <div class="barra-central">
            <input type="text" placeholder="🔍">
            <span class="filtro-texto">Filtro</span>
            <div class="iconos-header">
                <span>⬆️</span>
                <a href="Configuracion.html" class="icono-link">⚙️</a>
                <span>👤</span>
            </div>
        </div>

        <nav>
            <a href="login.html" class="btn-inicio-sesion">Iniciar sesión</a>
        </nav>
    </header>

    <main class="musicas-page">
        <div class="lista-musicas">

            <!-- Tarjeta 1 -->
            <a href="Usuario.html" class="musica-card enlace-musica">
                <img src="ride.jpg" alt="Ride - Álbum" class="musica-img">
                <span class="musica-titulo">Grabación Base</span>
                <a href="Usuario.html"></a>
            </a>

            <!-- Tarjeta 2 -->
            <div class="musica-card">
                <img src="disconnected.jpg" alt="Disconnected - Álbum" class="musica-img">
                <span class="musica-titulo">Voz</span>
            </div>

            <!-- Tarjeta 3 -->
            <div class="musica-card">
                <img src="lana.jpg" alt="Lana Del Rey - Born to Die" class="musica-img">
                <span class="musica-titulo">Voz</span>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2025 Sonaría | Plataforma de colaboración musical</p>
    </footer>
</body>
</html>
