<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario - Sonaría</title>
    <link rel="stylesheet" href="registro.css">
</head>
<body>
    <header class="header-con-busqueda">
       <a href="musicas.html" class="logo-link">
            <div class="logo">
                <img src="logo.png" alt="Logo Sonaría" class="logo-img">
                <span class="nombre">Sonaría</span>
            </div>
        </a>

        <div class="barra-central">
            <input type="text" placeholder="🔍">
            <span class="filtro-texto">Filtro</span>
            <div class="iconos-header">
                <span>⬆️</span>
                <a href="Configuracion.html" class="icono-link">⚙️</a>
                <span>👤</span>
            </div>
        </div>

        <nav>
            <a href="login.html" class="btn-inicio-sesion">Iniciar sesión</a>
        </nav>
    </header>

    <main class="register-container">
        <h1>Registro de Usuario</h1>
        <form class="form-registro">
            <label for="username">Nombre de usuario:</label>
            <input type="text" id="username" placeholder="Ingrese nombre de usuario" required>
            
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" placeholder="Ingrese email" required>
            
            <label for="password">Contraseña:</label>
            <input type="password" id="password" placeholder="Ingrese contraseña" required>
            
            <button type="submit" class="btn-accion">Registrarse</button>

            <p class="texto-login">
                ¿Ya tenés cuenta? <a href="login.html">Inicia sesión aquí</a>
            </p>
        </form>
    </main>

    <footer>
        <p>&copy; 2025 Sonaría | Plataforma de colaboración musical</p>
    </footer>
</body>
</html>
